<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}auto-listings.net{% endblock %}</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            background-color: #f5f5f5;
        }

        /* Navigation */
        nav {
            background-color: #333;
            padding: 1em;
            margin-bottom: 2em;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 1em;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Content area */
        .content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Listings grid */
        .listings {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px 0;
        }

        .listing-card {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .listing-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .listing-card a {
            display: inline-block;
            background: #333;
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            border-radius: 3px;
            margin-top: 10px;
        }

        .listing-card a:hover {
            background: #444;
        }

        /* Listing detail page */
        .listing-detail {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .listing-detail h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .vehicle-details {
            margin: 20px 0;
        }

        .vehicle-details ul {
            list-style: none;
        }

        .vehicle-details li {
            margin: 10px 0;
        }

        .description {
            margin: 20px 0;
        }

        .listing-meta {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        button {
            background: #333;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #444;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .listings {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'listings:listing_list' %}">auto-listings.net</a>
        <a href="{% url 'listings:listing_create' %}">Sell Your Car</a>
    </nav>
    
    <div class="content">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
